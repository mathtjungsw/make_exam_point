<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>문항 배점 생성기</title>
<style>
  :root{
    --bg1:#f6f8fc;
    --bg2:#eef3ff;
    --card:#ffffff;
    --line:#e6ebf5;
    --text:#162033;
    --muted:#6d7890;
    --accent:#5b7cff;
    --accent2:#7a5cff;
    --success:#13b981;
    --error:#ef4444;
    --shadow:0 18px 45px rgba(29, 41, 77, 0.08);
    --radius:24px;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: Inter, Pretendard, "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color:var(--text);
    background:
      radial-gradient(1200px 800px at 0% 0%, #ffffff 0%, rgba(255,255,255,.6) 45%, transparent 70%),
      linear-gradient(180deg, var(--bg2) 0%, var(--bg1) 100%);
  }
  .wrap{
    max-width:1280px;
    margin:0 auto;
    padding:28px 18px 56px;
  }
  .title{
    font-size:clamp(28px, 4vw, 42px);
    font-weight:900;
    letter-spacing:-0.03em;
    margin:8px 0 20px;
  }
  .layout{
    display:grid;
    grid-template-columns: 1.05fr .95fr;
    gap:20px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
  }
  .panel{
    padding:22px;
  }
  h2{
    margin:0 0 16px;
    font-size:20px;
    letter-spacing:-0.02em;
  }
  table{
    width:100%;
    border-collapse:collapse;
  }
  th,td{
    border:1px solid var(--line);
    padding:11px 10px;
    text-align:center;
  }
  th{
    background:#f8faff;
    font-weight:800;
  }
  td.label{
    text-align:left;
    font-weight:800;
    background:#fbfcff;
    padding-left:12px;
  }
  td.auto{
    background:#f8fbff;
    font-weight:700;
    color:#334155;
  }
  input{
    width:100%;
    border:1px solid #d9e1f0;
    border-radius:12px;
    padding:10px 12px;
    font-size:14px;
    color:var(--text);
    background:white;
    outline:none;
  }
  input:focus{
    border-color:#89a0ff;
    box-shadow:0 0 0 4px rgba(91,124,255,.12);
  }
  .tools{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:16px;
  }
  button{
    appearance:none;
    border:none;
    cursor:pointer;
    padding:13px 17px;
    border-radius:14px;
    font-size:14px;
    font-weight:800;
    transition:.15s ease;
  }
  button:hover{ transform:translateY(-1px); }
  .btn-primary{
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    color:white;
    box-shadow:0 14px 30px rgba(91,124,255,.22);
  }
  .btn-secondary{
    background:#f5f7fc;
    color:#334155;
    border:1px solid var(--line);
  }
  .btn-download{
    width:100%;
    background:linear-gradient(135deg, #0ea5e9, #2563eb);
    color:white;
    box-shadow:0 14px 30px rgba(37,99,235,.18);
  }
  .message{
    margin-top:16px;
    border-radius:16px;
    padding:14px 16px;
    line-height:1.65;
    font-size:14px;
    display:none;
    white-space:pre-wrap;
  }
  .message.error{
    display:block;
    background:#fff4f4;
    border:1px solid #ffcaca;
    color:#9f1239;
  }
  .message.success{
    display:block;
    background:#f0fdf6;
    border:1px solid #bbe9cf;
    color:#166534;
  }
  .results{
    display:grid;
    grid-template-columns:repeat(2, minmax(0,1fr));
    gap:14px;
  }
  .box{
    border:1px solid var(--line);
    border-radius:18px;
    overflow:hidden;
    background:#fcfdff;
  }
  .box-head{
    padding:12px 14px;
    font-weight:900;
    background:#f8faff;
    border-bottom:1px solid var(--line);
  }
  .score-list{
    list-style:none;
    margin:0;
    padding:12px;
    display:grid;
    gap:8px;
    min-height:70px;
  }
  .score-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 12px;
    border-radius:12px;
    border:1px solid #edf1f7;
    background:white;
    font-variant-numeric: tabular-nums;
  }
  .score-item .idx{
    font-size:12px;
    color:var(--muted);
    font-weight:800;
  }
  .score-item .val{
    font-size:15px;
    font-weight:900;
  }
  .summary{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-top:16px;
  }
  .summary-card{
    padding:14px;
    border-radius:16px;
    border:1px solid var(--line);
    background:#fbfcff;
  }
  .summary-card .small{
    font-size:12px;
    color:var(--muted);
    margin-bottom:6px;
  }
  .summary-card .big{
    font-size:23px;
    font-weight:900;
  }
  .download-wrap{
    margin-top:20px;
  }
  .section-gap{ height:8px; }
  @media (max-width: 1100px){
    .layout{ grid-template-columns:1fr; }
  }
  @media (max-width: 760px){
    .results{ grid-template-columns:1fr; }
    .summary{ grid-template-columns:1fr; }
    .panel{ padding:16px; }
    th,td{ padding:9px 6px; font-size:13px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">문항 배점 생성기</div>

  <div class="layout">
    <section class="card panel">
      <h2>기초자료 입력</h2>
      <table>
        <thead>
          <tr>
            <th style="width:120px">구분</th>
            <th>선택형</th>
            <th>서답형</th>
            <th>비율</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="label">문항개수</td>
            <td><input id="mcCount" type="number" step="1" value="16"></td>
            <td><input id="saCount" type="number" step="1" value="6"></td>
            <td class="auto"></td>
          </tr>
          <tr>
            <td class="label">상</td>
            <td><input id="mcHCnt" type="number" step="1" value="3"></td>
            <td><input id="saHCnt" type="number" step="1" value="2"></td>
            <td class="auto" id="ratioCntH"></td>
          </tr>
          <tr>
            <td class="label">중</td>
            <td><input id="mcMCnt" type="number" step="1" value="7"></td>
            <td><input id="saMCnt" type="number" step="1" value="4"></td>
            <td class="auto" id="ratioCntM"></td>
          </tr>
          <tr>
            <td class="label">하</td>
            <td><input id="mcLCnt" type="number" step="1" value="6"></td>
            <td><input id="saLCnt" type="number" step="1" value="0"></td>
            <td class="auto" id="ratioCntL"></td>
          </tr>
          <tr>
            <td class="label">합계</td>
            <td class="auto" id="mcCntSum"></td>
            <td class="auto" id="saCntSum"></td>
            <td class="auto" id="ratioCntSum"></td>
          </tr>

          <tr class="section-gap"><td colspan="4" style="border:none;background:transparent"></td></tr>

          <tr>
            <td class="label">문항점수</td>
            <td><input id="mcScore" type="number" step="1" value="50"></td>
            <td><input id="saScore" type="number" step="1" value="50"></td>
            <td class="auto"></td>
          </tr>
          <tr>
            <td class="label">상</td>
            <td><input id="mcHScore" type="number" step="1" value="15"></td>
            <td><input id="saHScore" type="number" step="1" value="20"></td>
            <td class="auto" id="ratioScoreH"></td>
          </tr>
          <tr>
            <td class="label">중</td>
            <td><input id="mcMScore" type="number" step="1" value="23"></td>
            <td><input id="saMScore" type="number" step="1" value="30"></td>
            <td class="auto" id="ratioScoreM"></td>
          </tr>
          <tr>
            <td class="label">하</td>
            <td><input id="mcLScore" type="number" step="1" value="12"></td>
            <td><input id="saLScore" type="number" step="1" value="0"></td>
            <td class="auto" id="ratioScoreL"></td>
          </tr>
          <tr>
            <td class="label">합계</td>
            <td class="auto" id="mcScoreSum"></td>
            <td class="auto" id="saScoreSum"></td>
            <td class="auto" id="ratioScoreSum"></td>
          </tr>
        </tbody>
      </table>

      <div class="tools">
        <button class="btn-primary" id="generateBtn">배점 생성</button>
        <button class="btn-secondary" id="resetBtn">기본값 복원</button>
      </div>

      <div id="message" class="message"></div>
    </section>

    <section class="card panel">
      <h2>문항 배점표</h2>

      <div class="results">
        <div class="box">
          <div class="box-head">선택형 상</div>
          <ul class="score-list" id="mcHighList"></ul>
        </div>
        <div class="box">
          <div class="box-head">서답형 상</div>
          <ul class="score-list" id="saHighList"></ul>
        </div>
        <div class="box">
          <div class="box-head">선택형 중</div>
          <ul class="score-list" id="mcMidList"></ul>
        </div>
        <div class="box">
          <div class="box-head">서답형 중</div>
          <ul class="score-list" id="saMidList"></ul>
        </div>
        <div class="box">
          <div class="box-head">선택형 하</div>
          <ul class="score-list" id="mcLowList"></ul>
        </div>
        <div class="box">
          <div class="box-head">서답형 하</div>
          <ul class="score-list" id="saLowList"></ul>
        </div>
      </div>

      <div class="summary">
        <div class="summary-card">
          <div class="small">선택형 총점</div>
          <div class="big" id="sumMC">0</div>
        </div>
        <div class="summary-card">
          <div class="small">서답형 총점</div>
          <div class="big" id="sumSA">0</div>
        </div>
        <div class="summary-card">
          <div class="small">전체 총점</div>
          <div class="big" id="sumAll">0</div>
        </div>
      </div>

      <div class="download-wrap">
        <h2 style="margin-bottom:12px;">내려받기</h2>
        <button class="btn-download" id="downloadBtn">XLSX 파일로 내려받기</button>
      </div>
    </section>
  </div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);

  const numericIds = [
    "mcCount","saCount","mcHCnt","saHCnt","mcMCnt","saMCnt","mcLCnt","saLCnt",
    "mcScore","saScore","mcHScore","saHScore","mcMScore","saMScore","mcLScore","saLScore"
  ];

  const defaults = {};
  numericIds.forEach(id => defaults[id] = $(id).value);

  let lastResult = null;

  function n(id){
    const v = parseInt($(id).value, 10);
    return Number.isFinite(v) ? v : 0;
  }

  function fmtPercent(value){
    return `${Math.round(value * 100)}%`;
  }

  function fmtOne(value){
    return (Math.round(value * 10) / 10).toFixed(1);
  }

  function sum(arr){
    return (arr || []).reduce((a,b) => a + b, 0);
  }

  function minVal(arr){ return Math.min(...arr); }
  function maxVal(arr){ return Math.max(...arr); }
  function arrayHasData(arr){ return Array.isArray(arr) && arr.length > 0; }
  function allSame(arr){ return arr.every(v => v === arr[0]); }
  function randInt(a,b){ return Math.floor(Math.random() * (b-a+1)) + a; }

  function sortDesc(arr){
    return arr.slice().sort((a,b)=>b-a);
  }

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1; i>0; i--){
      const j = randInt(0,i);
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function showMessage(text, type){
    const box = $("message");
    box.className = `message ${type}`;
    box.textContent = text;
  }

  function clearMessage(){
    const box = $("message");
    box.className = "message";
    box.textContent = "";
  }

  function safeAvg(total, cnt){
    return cnt > 0 ? total / cnt : 0;
  }

  function updateAutoFields(){
    const mcCount = n("mcCount"), saCount = n("saCount");
    const mcHCnt = n("mcHCnt"), saHCnt = n("saHCnt");
    const mcMCnt = n("mcMCnt"), saMCnt = n("saMCnt");
    const mcLCnt = n("mcLCnt"), saLCnt = n("saLCnt");

    const mcScore = n("mcScore"), saScore = n("saScore");
    const mcHScore = n("mcHScore"), saHScore = n("saHScore");
    const mcMScore = n("mcMScore"), saMScore = n("saMScore");
    const mcLScore = n("mcLScore"), saLScore = n("saLScore");

    const totalCnt = mcCount + saCount;
    const totalScore = mcScore + saScore;

    $("mcCntSum").textContent = mcHCnt + mcMCnt + mcLCnt;
    $("saCntSum").textContent = saHCnt + saMCnt + saLCnt;
    $("mcScoreSum").textContent = mcHScore + mcMScore + mcLScore;
    $("saScoreSum").textContent = saHScore + saMScore + saLScore;

    $("ratioCntH").textContent = totalCnt > 0 ? fmtPercent((mcHCnt + saHCnt) / totalCnt) : "";
    $("ratioCntM").textContent = totalCnt > 0 ? fmtPercent((mcMCnt + saMCnt) / totalCnt) : "";
    $("ratioCntL").textContent = totalCnt > 0 ? fmtPercent((mcLCnt + saLCnt) / totalCnt) : "";
    $("ratioCntSum").textContent = totalCnt > 0 ? "100%" : "";

    $("ratioScoreH").textContent = totalScore > 0 ? fmtPercent((mcHScore + saHScore) / totalScore) : "";
    $("ratioScoreM").textContent = totalScore > 0 ? fmtPercent((mcMScore + saMScore) / totalScore) : "";
    $("ratioScoreL").textContent = totalScore > 0 ? fmtPercent((mcLScore + saLScore) / totalScore) : "";
    $("ratioScoreSum").textContent = totalScore > 0 ? "100%" : "";
  }

  function validateInput(){
    updateAutoFields();
    const msgs = [];

    const mcCount = n("mcCount"), saCount = n("saCount");
    const mcHCnt = n("mcHCnt"), saHCnt = n("saHCnt");
    const mcMCnt = n("mcMCnt"), saMCnt = n("saMCnt");
    const mcLCnt = n("mcLCnt"), saLCnt = n("saLCnt");

    const mcScore = n("mcScore"), saScore = n("saScore");
    const mcHScore = n("mcHScore"), saHScore = n("saHScore");
    const mcMScore = n("mcMScore"), saMScore = n("saMScore");
    const mcLScore = n("mcLScore"), saLScore = n("saLScore");

    if (mcHCnt + mcMCnt + mcLCnt !== mcCount) msgs.push("- 선택형 상/중/하 문항개수의 합이 선택형 문항개수와 다릅니다.");
    if (saHCnt + saMCnt + saLCnt !== saCount) msgs.push("- 서답형 상/중/하 문항개수의 합이 서답형 문항개수와 다릅니다.");

    if (mcHScore + mcMScore + mcLScore !== mcScore) msgs.push("- 선택형 상/중/하 점수의 합이 선택형 문항점수와 다릅니다.");
    if (saHScore + saMScore + saLScore !== saScore) msgs.push("- 서답형 상/중/하 점수의 합이 서답형 문항점수와 다릅니다.");

    if (mcHCnt > 0 && mcHScore * 10 < mcHCnt) msgs.push("- 선택형 상: 최소 0.1점씩도 줄 수 없습니다.");
    if (mcMCnt > 0 && mcMScore * 10 < mcMCnt) msgs.push("- 선택형 중: 최소 0.1점씩도 줄 수 없습니다.");
    if (mcLCnt > 0 && mcLScore * 10 < mcLCnt) msgs.push("- 선택형 하: 최소 0.1점씩도 줄 수 없습니다.");

    if (saHCnt > 0 && saHScore < saHCnt) msgs.push("- 서답형 상: 최소 1점씩도 줄 수 없습니다.");
    if (saMCnt > 0 && saMScore < saMCnt) msgs.push("- 서답형 중: 최소 1점씩도 줄 수 없습니다.");
    if (saLCnt > 0 && saLScore < saLCnt) msgs.push("- 서답형 하: 최소 1점씩도 줄 수 없습니다.");

    return msgs;
  }

  function checkMCBoundary(arrH, arrM, arrL){
    if (arrayHasData(arrH) && arrayHasData(arrM) && maxVal(arrM) > minVal(arrH)) return false;
    if (arrayHasData(arrM) && arrayHasData(arrL) && maxVal(arrL) > minVal(arrM)) return false;
    return true;
  }

  function checkSABoundary(arrH, arrM, arrL){
    if (arrayHasData(arrH) && arrayHasData(arrM) && minVal(arrH) <= maxVal(arrM)) return false;
    if (arrayHasData(arrM) && arrayHasData(arrL) && minVal(arrM) <= maxVal(arrL)) return false;
    return true;
  }

  function checkMCInternalSpread(arr){
    if (!arrayHasData(arr)) return true;
    return (maxVal(arr) - minVal(arr) <= 10);
  }

  function buildRandomPartition(n, total, lowBound, highBound){
    if (n === 0) return total === 0 ? [] : null;
    if (total < n * lowBound || total > n * highBound) return null;

    const arr = [];
    let remain = total;

    for(let i=1; i<=n; i++){
      const vMin = Math.max(lowBound, remain - (n-i) * highBound);
      const vMax = Math.min(highBound, remain - (n-i) * lowBound);
      if (vMin > vMax) return null;
      const v = randInt(vMin, vMax);
      arr.push(v);
      remain -= v;
    }
    return remain === 0 ? shuffle(arr) : null;
  }

  function buildRandomPartitionMC(n, total, preferVariation=true){
    if (n === 0) return total === 0 ? [] : null;
    if (total < n) return null;

    const arr = new Array(n).fill(Math.floor(total / n));
    let remain = total % n;
    for(let i=0; i<remain; i++) arr[i] += 1;

    if (preferVariation && n >= 2){
      for(let t=0; t<100; t++){
        const i = randInt(0, n-1);
        const j = randInt(0, n-1);
        if (i !== j && arr[i] >= 2){
          arr[i] -= 1;
          arr[j] += 1;
          if (maxVal(arr) - minVal(arr) > 10){
            arr[i] += 1;
            arr[j] -= 1;
          }
        }
      }
    }

    let mixed = shuffle(arr);
    if (!checkMCInternalSpread(mixed)) return null;

    if (preferVariation && allSame(mixed) && n >= 2){
      for(let i=0; i<n; i++){
        for(let j=0; j<n; j++){
          if (i !== j && mixed[i] >= 2){
            mixed[i] -= 1;
            mixed[j] += 1;
            if (checkMCInternalSpread(mixed) && !allSame(mixed)) return mixed;
            mixed[i] += 1;
            mixed[j] -= 1;
          }
        }
      }
    }

    return mixed;
  }

  function generateMultipleChoice(){
    const nH = n("mcHCnt"), nM = n("mcMCnt"), nL = n("mcLCnt");
    const sH = n("mcHScore") * 10, sM = n("mcMScore") * 10, sL = n("mcLScore") * 10;

    const avgH = safeAvg(sH, nH) / 10;
    const avgM = safeAvg(sM, nM) / 10;
    const avgL = safeAvg(sL, nL) / 10;

    for(let tries=0; tries<8000; tries++){
      const arrL = buildRandomPartitionMC(nL, sL, true);
      const arrM = buildRandomPartitionMC(nM, sM, true);
      const arrH = buildRandomPartitionMC(nH, sH, true);

      if (arrL === null || arrM === null || arrH === null) continue;
      if (!checkMCInternalSpread(arrL) || !checkMCInternalSpread(arrM) || !checkMCInternalSpread(arrH)) continue;
      if (checkMCBoundary(arrH, arrM, arrL)){
        return { ok:true, arrH:sortDesc(arrH), arrM:sortDesc(arrM), arrL:sortDesc(arrL) };
      }
    }

    return {
      ok:false,
      reason:
`선택형 배점 생성에 실패했습니다.
- 같은 난이도 안에서 최고점과 최저점의 차이를 1.0점 이내로 유지해야 합니다.
- 동시에 상/중/하 경계 조건도 만족해야 합니다.
- 현재 평균: 상 ${avgH.toFixed(1)}점, 중 ${avgM.toFixed(1)}점, 하 ${avgL.toFixed(1)}점`,
      solution:
`1) 선택형 상 점수를 늘리세요.
2) 선택형 중 또는 하 점수를 낮추세요.
3) 같은 난이도 내 문항 수를 줄이면 분배가 쉬워집니다.
4) 소수점 차이를 만들 수 있도록 0.1 단위 여유가 있는지 확인하세요.`
    };
  }

  function generateShortAnswer(){
    const nH = n("saHCnt"), nM = n("saMCnt"), nL = n("saLCnt");
    const sH = n("saHScore"), sM = n("saMScore"), sL = n("saLScore");

    const avgH = safeAvg(sH, nH);
    const avgM = safeAvg(sM, nM);
    const avgL = safeAvg(sL, nL);

    let feasible = false, a = 1, b = 2;

    outer:
    for(a=1; a<=1000; a++){
      if (nL > 0 && (sL < nL || sL > nL * a)) continue;
      for(b=a+1; b<=1000; b++){
        if (nM > 0 && (sM < nM*(a+1) || sM > nM*b)) continue;
        if (nH > 0 && sH < nH*(b+1)) continue;
        feasible = true;
        break outer;
      }
    }

    if (!feasible){
      return {
        ok:false,
        reason:
`서답형 배점 생성에 실패했습니다.
- 난이도 간 점수 구간을 엄격히 분리할 수 없는 구조입니다.
- 현재 평균: 상 ${avgH.toFixed(1)}점, 중 ${avgM.toFixed(1)}점, 하 ${avgL.toFixed(1)}점`,
        solution:
`1) 서답형 상 점수를 늘리세요.
2) 서답형 중 점수를 낮추세요.
3) 서답형 하 점수를 더 낮추세요.
4) 각 난이도 문항 수를 조정하세요.`
      };
    }

    for(let tries=0; tries<5000; tries++){
      const arrL = buildRandomPartition(nL, sL, 1, a);
      const arrM = buildRandomPartition(nM, sM, a+1, b);
      const arrH = buildRandomPartition(nH, sH, b+1, Math.max(sH, b+1));

      if (arrL === null || arrM === null || arrH === null) continue;
      if (checkSABoundary(arrH, arrM, arrL)){
        return { ok:true, arrH:sortDesc(arrH), arrM:sortDesc(arrM), arrL:sortDesc(arrL) };
      }
    }

    return {
      ok:false,
      reason:
`서답형 배점 생성에 실패했습니다.
- 난이도 경계 조건을 만족하는 자연수 조합을 찾지 못했습니다.
- 현재 평균: 상 ${avgH.toFixed(1)}점, 중 ${avgM.toFixed(1)}점, 하 ${avgL.toFixed(1)}점`,
      solution:
`1) 서답형 상 점수를 늘리세요.
2) 서답형 중 점수를 낮추세요.
3) 서답형 하 점수를 더 낮추세요.
4) 각 난이도 문항 수를 조정하세요.`
    };
  }

  function renderList(elId, arr, isDecimal){
    const ul = $(elId);
    ul.innerHTML = "";
    if (!arrayHasData(arr)){
      ul.innerHTML = `<li class="score-item"><span class="idx">-</span><span class="val">없음</span></li>`;
      return;
    }
    arr.forEach((v, i) => {
      const li = document.createElement("li");
      li.className = "score-item";
      li.innerHTML = `<span class="idx">${i+1}번</span><span class="val">${isDecimal ? fmtOne(v / 10) : String(v)}</span>`;
      ul.appendChild(li);
    });
  }

  function renderResults(result){
    renderList("mcHighList", result.mcHigh, true);
    renderList("mcMidList", result.mcMid, true);
    renderList("mcLowList", result.mcLow, true);
    renderList("saHighList", result.saHigh, false);
    renderList("saMidList", result.saMid, false);
    renderList("saLowList", result.saLow, false);

    const mcSum = (sum(result.mcHigh) + sum(result.mcMid) + sum(result.mcLow)) / 10;
    const saSum = sum(result.saHigh) + sum(result.saMid) + sum(result.saLow);

    $("sumMC").textContent = fmtOne(mcSum);
    $("sumSA").textContent = String(saSum);
    $("sumAll").textContent = fmtOne(mcSum + saSum);
  }

  function clearResults(){
    ["mcHighList","mcMidList","mcLowList","saHighList","saMidList","saLowList"].forEach(id => $(id).innerHTML = "");
    $("sumMC").textContent = "0";
    $("sumSA").textContent = "0";
    $("sumAll").textContent = "0";
  }

  function generate(){
    clearMessage();
    updateAutoFields();

    const errors = validateInput();
    if (errors.length){
      lastResult = null;
      clearResults();
      showMessage("오류 및 해결방법\n\n" + errors.join("\n"), "error");
      return;
    }

    const mc = generateMultipleChoice();
    if (!mc.ok){
      lastResult = null;
      clearResults();
      showMessage(`오류 및 해결방법\n\n[실패 사유]\n${mc.reason}\n\n[해결 방법]\n${mc.solution}`, "error");
      return;
    }

    const sa = generateShortAnswer();
    if (!sa.ok){
      lastResult = null;
      clearResults();
      showMessage(`오류 및 해결방법\n\n[실패 사유]\n${sa.reason}\n\n[해결 방법]\n${sa.solution}`, "error");
      return;
    }

    lastResult = {
      mcHigh: mc.arrH,
      mcMid: mc.arrM,
      mcLow: mc.arrL,
      saHigh: sa.arrH,
      saMid: sa.arrM,
      saLow: sa.arrL
    };

    renderResults(lastResult);
    showMessage("배점 생성이 완료되었습니다.", "success");
  }

  function resetDefaults(){
    numericIds.forEach(id => $(id).value = defaults[id]);
    updateAutoFields();
    clearMessage();
    clearResults();
    lastResult = null;
  }

  function escapeXml(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
  }
  function colLetter(n){
    let s = "";
    while(n > 0){
      const m = (n - 1) % 26;
      s = String.fromCharCode(65 + m) + s;
      n = Math.floor((n - 1) / 26);
    }
    return s;
  }
  function sheetXmlFromCells(cells, merges=[]){
    const rows = new Map();
    let maxR = 1, maxC = 1;
    for (const [addr, cell] of Object.entries(cells)){
      const match = addr.match(/^([A-Z]+)(\d+)$/);
      if (!match) continue;
      const row = parseInt(match[2],10);
      let col = 0;
      for (const ch of match[1]) col = col * 26 + ch.charCodeAt(0) - 64;
      maxR = Math.max(maxR, row);
      maxC = Math.max(maxC, col);
      if (!rows.has(row)) rows.set(row, []);
      rows.get(row).push({addr, col, ...cell});
    }
    const rowXml = [];
    Array.from(rows.keys()).sort((a,b)=>a-b).forEach(r => {
      const cellsXml = rows.get(r).sort((a,b)=>a.col-b.col).map(c => {
        if (c.type === "n") return `<c r="${c.addr}"><v>${c.value}</v></c>`;
        return `<c r="${c.addr}" t="inlineStr"><is><t>${escapeXml(c.value ?? "")}</t></is></c>`;
      }).join("");
      rowXml.push(`<row r="${r}">${cellsXml}</row>`);
    });
    const mergeXml = merges.length ? `<mergeCells count="${merges.length}">${merges.map(m=>`<mergeCell ref="${m}"/>`).join("")}</mergeCells>` : "";
    return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
  <dimension ref="A1:${colLetter(maxC)}${maxR}"/>
  <sheetViews><sheetView workbookViewId="0"/></sheetViews>
  <sheetFormatPr defaultRowHeight="15"/>
  <sheetData>${rowXml.join("")}</sheetData>
  ${mergeXml}
</worksheet>`;
  }
  function makeWorkbookXml(){
    return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
  <sheets>
    <sheet name="기초자료" sheetId="1" r:id="rId1"/>
    <sheet name="문항 배점표" sheetId="2" r:id="rId2"/>
  </sheets>
</workbook>`;
  }
  function makeWorkbookRelsXml(){
    return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>
  <Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet2.xml"/>
</Relationships>`;
  }
  function makeRootRelsXml(){
    return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
</Relationships>`;
  }
  function makeContentTypesXml(){
    return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
  <Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>
  <Override PartName="/xl/worksheets/sheet2.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>
</Types>`;
  }
  function strToU8(str){ return new TextEncoder().encode(str); }
  function u16(n){ return [n & 255, (n>>>8)&255]; }
  function u32(n){ return [n & 255, (n>>>8)&255, (n>>>16)&255, (n>>>24)&255]; }
  function crc32(buf){
    let c;
    const table = crc32.table || (crc32.table = (() => {
      const t = [];
      for (let n = 0; n < 256; n++) {
        c = n;
        for (let k = 0; k < 8; k++) c = ((c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1));
        t[n] = c >>> 0;
      }
      return t;
    })());
    let crc = 0 ^ (-1);
    for (let i = 0; i < buf.length; i++) crc = (crc >>> 8) ^ table[(crc ^ buf[i]) & 0xFF];
    return (crc ^ (-1)) >>> 0;
  }
  function zipStore(files){
    let localParts = [];
    let centralParts = [];
    let offset = 0;

    files.forEach(file => {
      const nameBytes = strToU8(file.name);
      const data = file.data instanceof Uint8Array ? file.data : strToU8(file.data);
      const crc = crc32(data);
      const localHeader = new Uint8Array([
        ...u32(0x04034b50), ...u16(20), ...u16(0), ...u16(0), ...u16(0), ...u16(0),
        ...u32(crc), ...u32(data.length), ...u32(data.length), ...u16(nameBytes.length), ...u16(0), ...nameBytes
      ]);
      localParts.push(localHeader, data);

      const centralHeader = new Uint8Array([
        ...u32(0x02014b50), ...u16(20), ...u16(20), ...u16(0), ...u16(0), ...u16(0), ...u16(0),
        ...u32(crc), ...u32(data.length), ...u32(data.length),
        ...u16(nameBytes.length), ...u16(0), ...u16(0), ...u16(0), ...u16(0),
        ...u32(0), ...u32(offset), ...nameBytes
      ]);
      centralParts.push(centralHeader);
      offset += localHeader.length + data.length;
    });

    const centralSize = centralParts.reduce((n,p)=>n+p.length,0);
    const centralOffset = offset;
    const end = new Uint8Array([
      ...u32(0x06054b50), ...u16(0), ...u16(0),
      ...u16(files.length), ...u16(files.length),
      ...u32(centralSize), ...u32(centralOffset), ...u16(0)
    ]);

    const totalLength = localParts.reduce((n,p)=>n+p.length,0) + centralSize + end.length;
    const out = new Uint8Array(totalLength);
    let ptr = 0;
    [...localParts, ...centralParts, end].forEach(part => {
      out.set(part, ptr);
      ptr += part.length;
    });
    return out;
  }

  function buildWorkbookFiles(){
    updateAutoFields();

    const totalCnt = n("mcCount") + n("saCount");
    const totalScore = n("mcScore") + n("saScore");

    const inputCells = {
      A1:{type:"s", value:"구분"}, B1:{type:"s", value:"선택형"}, C1:{type:"s", value:"서답형"}, D1:{type:"s", value:"비율"},
      A2:{type:"s", value:"문항개수"}, B2:{type:"n", value:n("mcCount")}, C2:{type:"n", value:n("saCount")},
      A3:{type:"s", value:"상"}, B3:{type:"n", value:n("mcHCnt")}, C3:{type:"n", value:n("saHCnt")}, D3:{type:"s", value:$("ratioCntH").textContent},
      A4:{type:"s", value:"중"}, B4:{type:"n", value:n("mcMCnt")}, C4:{type:"n", value:n("saMCnt")}, D4:{type:"s", value:$("ratioCntM").textContent},
      A5:{type:"s", value:"하"}, B5:{type:"n", value:n("mcLCnt")}, C5:{type:"n", value:n("saLCnt")}, D5:{type:"s", value:$("ratioCntL").textContent},
      A6:{type:"s", value:"합계"}, B6:{type:"n", value:Number($("mcCntSum").textContent || 0)}, C6:{type:"n", value:Number($("saCntSum").textContent || 0)}, D6:{type:"s", value:"100%"},
      A8:{type:"s", value:"문항점수"}, B8:{type:"n", value:n("mcScore")}, C8:{type:"n", value:n("saScore")},
      A9:{type:"s", value:"상"}, B9:{type:"n", value:n("mcHScore")}, C9:{type:"n", value:n("saHScore")}, D9:{type:"s", value:$("ratioScoreH").textContent},
      A10:{type:"s", value:"중"}, B10:{type:"n", value:n("mcMScore")}, C10:{type:"n", value:n("saMScore")}, D10:{type:"s", value:$("ratioScoreM").textContent},
      A11:{type:"s", value:"하"}, B11:{type:"n", value:n("mcLScore")}, C11:{type:"n", value:n("saLScore")}, D11:{type:"s", value:$("ratioScoreL").textContent},
      A12:{type:"s", value:"합계"}, B12:{type:"n", value:Number($("mcScoreSum").textContent || 0)}, C12:{type:"n", value:Number($("saScoreSum").textContent || 0)}, D12:{type:"s", value:"100%"}
    };

    const outputCells = {
      A1:{type:"s", value:"선택형 상"},
      B1:{type:"s", value:"선택형 중"},
      C1:{type:"s", value:"선택형 하"},
      E1:{type:"s", value:"서답형 상"},
      F1:{type:"s", value:"서답형 중"},
      G1:{type:"s", value:"서답형 하"}
    };

    if (lastResult){
      lastResult.mcHigh.forEach((v,i)=> outputCells[`A${i+2}`] = {type:"n", value:Number((v/10).toFixed(1))});
      lastResult.mcMid.forEach((v,i)=> outputCells[`B${i+2}`] = {type:"n", value:Number((v/10).toFixed(1))});
      lastResult.mcLow.forEach((v,i)=> outputCells[`C${i+2}`] = {type:"n", value:Number((v/10).toFixed(1))});
      lastResult.saHigh.forEach((v,i)=> outputCells[`E${i+2}`] = {type:"n", value:v});
      lastResult.saMid.forEach((v,i)=> outputCells[`F${i+2}`] = {type:"n", value:v});
      lastResult.saLow.forEach((v,i)=> outputCells[`G${i+2}`] = {type:"n", value:v});
    }

    const sheet1 = sheetXmlFromCells(inputCells);
    const sheet2 = sheetXmlFromCells(outputCells);

    return [
      { name:"[Content_Types].xml", data: makeContentTypesXml() },
      { name:"_rels/.rels", data: makeRootRelsXml() },
      { name:"xl/workbook.xml", data: makeWorkbookXml() },
      { name:"xl/_rels/workbook.xml.rels", data: makeWorkbookRelsXml() },
      { name:"xl/worksheets/sheet1.xml", data: sheet1 },
      { name:"xl/worksheets/sheet2.xml", data: sheet2 }
    ];
  }

  function downloadBlob(filename, blob){
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function downloadXlsx(){
    if (!lastResult){
      showMessage("오류 및 해결방법\n\n먼저 배점을 생성해 주세요.", "error");
      return;
    }
    const files = buildWorkbookFiles();
    const bytes = zipStore(files);
    const blob = new Blob([bytes], {type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    downloadBlob("문항_배점_생성기.xlsx", blob);
  }

  numericIds.forEach(id => $(id).addEventListener("input", updateAutoFields));
  $("generateBtn").addEventListener("click", generate);
  $("resetBtn").addEventListener("click", resetDefaults);
  $("downloadBtn").addEventListener("click", downloadXlsx);

  updateAutoFields();
})();
</script>
